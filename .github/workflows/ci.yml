name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}

      - name: cargo test
        run: cargo test

  build:
    name: Build Release
    runs-on: macos-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('Cargo.lock') }}

      - name: cargo build --release
        run: cargo build --release

      - name: Package .app bundle
        run: |
          APP="Kimi Code Status.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/kimi-code-status "$APP/Contents/MacOS/"
          cp icons/statusbar_template.png "$APP/Contents/Resources/"
          cat > "$APP/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Kimi Code Status</string>
            <key>CFBundleIdentifier</key>
            <string>io.ccswitch.kimi-code-status</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>kimi-code-status</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "App bundle created: $APP"

      - name: Create .dmg
        run: |
          mkdir -p dmg
          cp -R "Kimi Code Status.app" dmg/
          hdiutil create -volname "Kimi Code Status" -srcfolder dmg -ov -format UDZO "Kimi Code Status.dmg"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kimi-Code-Status-app
          path: "Kimi Code Status.app"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kimi-Code-Status-dmg
          path: "Kimi Code Status.dmg"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kimi-code-status-binary
          path: target/release/kimi-code-status

  release:
    name: GitHub Release
    runs-on: macos-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Kimi-Code-Status-dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Kimi Code Status.dmg"
          generate_release_notes: true
